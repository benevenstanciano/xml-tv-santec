name: Update EPG

on:
  schedule:
    - cron: "17 3 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run generator
        run: |
          xmltv-epg --config config.yaml

      - name: Copy XML to docs for GitHub Pages
        run: |
          mkdir -p docs
          cp -f output/*.xml docs/

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data output docs
          git diff --cached --quiet || git commit -m "Update EPG"
          git push
