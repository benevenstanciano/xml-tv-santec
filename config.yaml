base_url: "https://radio-santec.com/wp-content/sendeplan/{lang}/WEBTV-{lang_upper}_KW{kw:02d}.csv"

timezone: "UTC"

paths:
  data_dir: "data"
  csv_dir: "data/csv"
  state_file: "data/state.json"
  output_dir: "output"

fetch:
  timeout_seconds: 30
  user_agent: "xmltv-epg-generator/0.3 (+https://github.com/benevenstanciano/xml-tv-santec)"
  kw_min: 1
  kw_max: 52

parser:
  columns:
    start_datetime: "Sendezeit"
    duration: "Länge"
    title: "Titel_Sprache"
    desc: "Beschreibung_Sprache"

retention:
  keep_past_days: 7
  keep_future_days: 28

csv_cleanup:
  enabled: true
  keep_past_files_per_language: 2

languages:
  - code: "en"
    channel_id: "radio-santec.webtv.en"
    display_name: "Radio Santec WebTV EN"
    placeholder_title: "Sophia TV"
    placeholder_desc: "Sophia TV is an independent Christian television station. Programs include meditations, spiritual teachings, as well as children's programs and classical music."

  - code: "pt"
    channel_id: "radio-santec.webtv.pt"
    display_name: "Radio Santec WebTV PT"
    placeholder_title: "Sophia TV"
    placeholder_desc: "Sophia TV é um canal de televisão cristão independente. Os programas incluem meditações, ensinamentos espirituais, bem como programas infantis e música clássica."

  - code: "es"
    channel_id: "radio-santec.webtv.es"
    display_name: "Radio Santec WebTV ES"
    url_template: "https://radio-santec.com/wp-content/sendeplan/es/WEBTV/WEBTV-ES_KW{kw:02d}.csv"
    placeholder_title: "Sophia TV"
    placeholder_desc: "Sophia TV es un canal de televisión cristiano independiente. Los programas incluyen meditaciones, enseñanzas espirituales, así como programas infantiles y música clásica."
